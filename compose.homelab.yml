services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge_fitness_app
      POSTGRES_PASSWORD: ${FORGE_FITNESS_APP_DATABASE_PASSWORD}
      POSTGRES_DB: forge_fitness_app_production
    volumes:
      - forge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge_fitness_app -d forge_fitness_app_production"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:80"
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      FORGE_FITNESS_APP_DATABASE_PASSWORD: ${FORGE_FITNESS_APP_DATABASE_PASSWORD}
      DATABASE_HOST: db
      RAILS_LOG_TO_STDOUT: "true"

volumes:
  forge_postgres_data: